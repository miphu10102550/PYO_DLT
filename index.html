<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYO_DLT – เข้าสู่ระบบ</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="auth-form" class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 3H4a2 2 0 00-2 2v14a2 2 0 002 2h16a2 2 0 002-2V5a2 2 0 00-2-2zm-7 3h2v2h-2V6zm0 4h2v2h-2v-2zm-4-4h2v2H9V6zm0 4h2v2H9v-2zm-4 0h2v2H5v-2zm0-4h2v2H5V6zm14 12H5v-2h14v2zm0-4H5v-2h14v2zm0-4h-2v-2h2v2zm0-4h-2V6h2v2z"/></svg>
      </div>
      <h1>PYO_DLT</h1>
      <p>ระบบจัดการครุภัณฑ์คอมพิวเตอร์</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">เข้าสู่ระบบ</button>
      <button class="auth-tab" data-tab="register">สมัครสมาชิก</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label>ชื่อผู้ใช้</label>
        <div class="input-icon-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
          <input id="login-username" class="form-control" type="text" placeholder="กรอกชื่อผู้ใช้">
        </div>
      </div>
      <div class="form-group">
        <label>รหัสผ่าน</label>
        <div class="input-icon-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input id="login-password" class="form-control" type="password" placeholder="กรอกรหัสผ่าน">
        </div>
      </div>
      <button id="login-btn" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        เข้าสู่ระบบ
      </button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>ชื่อ-นามสกุล</label>
        <input id="reg-fullname" class="form-control" type="text" placeholder="ชื่อ-นามสกุล">
      </div>
      <div class="form-group">
        <label>ชื่อผู้ใช้</label>
        <input id="reg-username" class="form-control" type="text" placeholder="Username">
      </div>
      <div class="form-group">
        <label>อีเมล (ไม่บังคับ)</label>
        <input id="reg-email" class="form-control" type="email" placeholder="example@dlt.go.th">
      </div>
      <div class="form-group">
        <label>หน่วยงาน / ฝ่าย</label>
        <select id="reg-department" class="form-control">
          <option value="">-- เลือกหน่วยงาน --</option>
          <option value="reg">ฝ่ายทะเบียนรถ</option>
          <option value="inspection">ตรวจสภาพรถ</option>
          <option value="academic">กลุ่มวิชาการ</option>
          <option value="admin">งานบริหาร</option>
          <option value="license">ฝ่ายใบอนุญาต</option>
          <option value="supply">ห้องพัสดุบริหาร</option>
        </select>
      </div>
      <div class="form-group">
        <label>รหัสผ่าน</label>
        <input id="reg-password" class="form-control" type="password" placeholder="อย่างน้อย 6 ตัวอักษร">
      </div>
      <div class="form-group">
        <label>ยืนยันรหัสผ่าน</label>
        <input id="reg-confirm" class="form-control" type="password" placeholder="พิมพ์รหัสผ่านอีกครั้ง">
      </div>
      <button id="register-btn" class="btn btn-accent btn-block btn-lg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8zM19 8v6M22 11h-6"/></svg>
        สมัครสมาชิก
      </button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
